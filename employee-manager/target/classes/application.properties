# Spring Application Name
spring.application.name=employee-manager

# H2 In-Memory Database Configuration
spring.datasource.url=jdbc:h2:mem:employeedb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Hibernate DDL configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# H2 Web Console Configuration (Accessible via http://localhost:8081/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# Server Port Configuration
server.port=8081

# Configure Logging
logging.level.org.springframework.web=INFO
logging.level.com.antigravity.employeemanager=DEBUG
